apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  # name must match the spec fields below, and be in the form: <plural>.<group>
  name: namespaceuiautomationsettings.perfectscale.io
spec:
  # either Namespaced or Cluster
  scope: Namespaced
  # group name to use for REST API: /apis/<group>/<version>
  group: perfectscale.io
  names:
    # plural name to be used in the URL: /apis/<group>/<version>/<plural>
    plural: namespaceuiautomationsettings
    # singular name to be used as an alias on the CLI and for display
    singular: namespaceuiautomationsetting
    # kind is normally the CamelCased singular type. Your resource manifests use this.
    kind: NamespaceUIAutomationSetting
    # shortNames allow shorter string to match your resource on the CLI
    shortNames:
      - nuias
  # list of versions supported by this CustomResourceDefinition
  versions:
    - name: v1
      # Each version can be enabled/disabled by Served flag.
      served: true
      # One and only one version must be marked as the storage version.
      storage: true
      additionalPrinterColumns:
        - name: Workloads
          type: integer
          jsonPath: .spec.enabledWorkloadCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                enabledWorkloads:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      kind:
                        type: string
                enabledWorkloadCount:
                  type: integer
                  minimum: 0
