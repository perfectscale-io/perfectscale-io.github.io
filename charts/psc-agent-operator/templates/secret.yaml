{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "psc-agent-operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  clientId: {{ required "secret.clientId is required when secret.create is true" .Values.secret.clientId | quote }}
  clientSecret: {{ required "secret.clientSecret is required when secret.create is true" .Values.secret.clientSecret | quote }}
{{- end }}
